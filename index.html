<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarnaPulse - El latido de Barcelona</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 10; }
        
        /* Efecto Glassmorphism para los paneles */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* Animación de pulso para eventos activos */
        .pulse-marker {
            animation: pulse 2s infinite;
            border-radius: 50%;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-gray-100">

    <header class="absolute top-0 left-0 w-full z-50 p-4 pointer-events-none">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="glass-panel px-6 py-3 rounded-full flex items-center gap-3 pointer-events-auto">
                <i class="fa-solid fa-map-location-dot text-indigo-600 text-2xl"></i>
                <h1 class="text-xl font-bold text-gray-800 tracking-tight">BarnaPulse</h1>
            </div>
            
            <button onclick="abrirModalCreacion()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-full font-semibold shadow-lg transition-transform transform hover:scale-105 pointer-events-auto flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Añadir Evento
            </button>
        </div>
    </header>

    <div id="map"></div>

    <div id="sidebar" class="absolute top-0 right-0 h-full w-96 glass-panel z-50 transform translate-x-full transition-transform duration-300 shadow-2xl flex flex-col pointer-events-auto">
        <div class="p-6 flex-1 overflow-y-auto" id="event-details">
            </div>
        <div class="p-4 border-t border-gray-200 bg-white bg-opacity-50">
            <button onclick="cerrarSidebar()" class="w-full py-3 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-lg font-semibold transition-colors">
                Cerrar Panel
            </button>
        </div>
    </div>

    <script>
        // 1. Inicialización del Mapa centrado en Barcelona
        const map = L.map('map', { zoomControl: false }).setView([41.3851, 2.1734], 14);
        
        // Controles de zoom abajo a la derecha
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // Capa de mapa profesional (CartoDB Positron)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            maxZoom: 19
        }).addTo(map);

        // 2. Base de Datos Simulada (Esto vendría de GitHub Issues o Firebase)
        const eventos = [
            {
                id: 1,
                titulo: "Manifestación por la Vivienda",
                categoria: "protesta",
                lat: 41.3870, lng: 2.1698, // Plaça Catalunya
                hora: "18:00 - Hoy",
                descripcion: "Concentración pacífica para reclamar alquileres justos en la ciudad.",
                autor: "@activista_bcn",
                validaciones: 145,
                trustScore: 98,
                reviews: [
                    { usuario: "Laura", comentario: "Ya hay mucha gente reuniéndose." },
                    { usuario: "Marc", comentario: "La cabecera está en Portal de l'Àngel." }
                ],
                activoAhora: true
            },
            {
                id: 2,
                titulo: "Festes de Gràcia - Concierto Rumba",
                categoria: "fiesta",
                lat: 41.4025, lng: 2.1565, // Plaça del Sol
                hora: "21:30 - Hoy",
                descripcion: "Concierto en directo al aire libre. Habrá barras y comida.",
                autor: "@comissio_festes",
                validaciones: 320,
                trustScore: 100,
                reviews: [],
                activoAhora: false
            },
            {
                id: 3,
                titulo: "Rua de Diables (Correfoc)",
                categoria: "desfile",
                lat: 41.3833, lng: 2.1765, // Via Laietana
                hora: "20:00 - Mañana",
                descripcion: "Tradicional correfoc recorriendo Ciutat Vella. Llevar ropa de algodón.",
                autor: "@cultura_cat",
                validaciones: 85,
                trustScore: 90,
                reviews: [],
                activoAhora: false
            }
        ];

        // 3. Configuración de Iconos
        const iconos = {
            protesta: L.divIcon({ html: '<div class="bg-red-500 text-white w-10 h-10 flex items-center justify-center rounded-full shadow-lg pulse-marker"><i class="fa-solid fa-bullhorn"></i></div>', className: '' }),
            fiesta: L.divIcon({ html: '<div class="bg-purple-500 text-white w-10 h-10 flex items-center justify-center rounded-full shadow-lg"><i class="fa-solid fa-champagne-glasses"></i></div>', className: '' }),
            desfile: L.divIcon({ html: '<div class="bg-orange-500 text-white w-10 h-10 flex items-center justify-center rounded-full shadow-lg"><i class="fa-solid fa-fire"></i></div>', className: '' })
        };

        // 4. Renderizar Marcadores
        eventos.forEach(evento => {
            const marker = L.marker([evento.lat, evento.lng], { icon: iconos[evento.categoria] }).addTo(map);
            marker.on('click', () => abrirSidebar(evento));
        });

        // 5. Lógica de Interfaz de Usuario
        const sidebar = document.getElementById('sidebar');
        const eventDetails = document.getElementById('event-details');

        function abrirSidebar(evento) {
            // Generar el HTML de las reviews
            const reviewsHTML = evento.reviews.length > 0 
                ? evento.reviews.map(r => `<div class="bg-gray-50 p-3 rounded mb-2 text-sm"><span class="font-bold">${r.usuario}:</span> ${r.comentario}</div>`).join('')
                : `<p class="text-gray-500 text-sm italic">No hay actualizaciones en vivo aún.</p>`;

            // Inyectar contenido en el panel
            eventDetails.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <span class="px-3 py-1 bg-indigo-100 text-indigo-800 rounded-full text-xs font-bold uppercase tracking-wide">${evento.categoria}</span>
                    <span class="text-green-600 font-bold text-sm flex items-center gap-1"><i class="fa-solid fa-shield-check"></i> ${evento.trustScore}% Fiable</span>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">${evento.titulo}</h2>
                <p class="text-gray-600 mb-4"><i class="fa-regular fa-clock mr-2"></i>${evento.hora}</p>
                <p class="text-gray-700 mb-6 leading-relaxed">${evento.descripcion}</p>
                
                <div class="flex gap-2 mb-6">
                    <button onclick="validarEvento(${evento.id})" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2 rounded font-semibold transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-check"></i> Validar (${evento.validaciones})
                    </button>
                    <button onclick="escribirReview()" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 rounded font-semibold transition-colors flex items-center justify-center gap-2">
                        <i class="fa-regular fa-comment"></i> Review
                    </button>
                </div>

                <h3 class="font-bold text-gray-800 mb-3 border-b pb-2">Actualizaciones en vivo</h3>
                ${reviewsHTML}
                
                <p class="text-xs text-gray-400 mt-6 text-center">Añadido por ${evento.autor}</p>
            `;
            
            // Mostrar panel
            sidebar.classList.remove('translate-x-full');
            map.panTo([evento.lat, evento.lng]);
        }

        function cerrarSidebar() {
            sidebar.classList.add('translate-x-full');
        }

        // Simulación de interacción
        function validarEvento(id) {
            alert("¡Gracias por colaborar! Has validado que este evento es real. El 'Trust Score' ha subido.");
        }

        function escribirReview() {
            const res = prompt("Escribe una actualización o comentario sobre el evento:");
            if(res) alert("Tu comentario ha sido enviado para revisión por la comunidad.");
        }

        function abrirModalCreacion() {
            alert("Aquí se abriría un formulario para colocar un PIN en el mapa, añadir título, fotos, y enviarlo como un 'Pull Request' o 'Issue' a la base de datos comunitaria para ser validado.");
        }
    </script>
</body>
</html>
